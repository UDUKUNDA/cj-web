services:
  cj-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: cj-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Add runtime env vars here, e.g.:
      # - NEXT_PUBLIC_API_URL=https://api.creditjambo.com
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
